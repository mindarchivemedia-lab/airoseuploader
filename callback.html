<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating AiroseUploader...</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; text-align: center; margin-top: 100px; color: #334155; background-color: #f8fafc; }
        .spinner { border: 4px solid #e2e8f0; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        window.onload = function() {
            // Grab the authorization code and state that TikTok attaches to the URL
            const urlParams = window.location.search;
            
            // Redirect them to the local server your desktop app is running
            // NOTE: Change "8080" if your local app listens on a different port!
            const localAppUrl = "http://127.0.0.1:8080/callback" + urlParams;
            
            // Send the user back to the desktop app
            window.location.href = localAppUrl;
        }
    </script>
</head>
<body>
    <div class="spinner"></div>
    <h2>Login Successful!</h2>
    <p>Sending you back to AiroseUploader...</p>
    <p style="font-size: 0.9em; color: #64748b; margin-top: 30px;">You can close this window once the app responds.</p>
</body>
</html>
